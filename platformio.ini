; ══════════════════════════════════════════════════════════════════
; PlatformIO Configuration
; Meteorological Data Acquisition System
; Target: ESP32-WROOM-32D
; ══════════════════════════════════════════════════════════════════

[env:esp32-wroom-32d]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3          ; INFO level logging
    -DBOARD_HAS_PSRAM=0           ; WROOM-32D has no PSRAM
    -DARDUINO_EVENT_RUNNING_CORE=1 ; WiFi events on Core 1
    -DARDUINO_RUNNING_CORE=1       ; Arduino loop() on Core 1

; Library dependencies
lib_deps =
    adafruit/Adafruit HDC302x@^1.0.0
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BusIO@^1.16.0
    adafruit/Adafruit BMP5XX Library
; Upload settings (adjust port for your system)
; upload_port = /dev/ttyUSB0
; upload_speed = 921600

; Partition scheme — use default (1.2 MB app, 1.5 MB SPIFFS)
; For OTA support, switch to:
;   board_build.partitions = min_spiffs.csv
